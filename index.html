<!doctype html>
<html lang="es">
  <head>
    <!-- Codificación de caracteres UTF-8 para soporte completo de caracteres en español -->
    <meta charset="UTF-8" />
    <!-- Viewport responsivo: ancho del dispositivo, escala inicial 1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título de la pestaña del navegador -->
    <title>SmartHall - Vivimostodos</title>
    <!-- Favicon: ícono SVG del logo de SmartHall -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <!-- Metadatos SEO y redes sociales -->
    <meta name="author" content="SmartHall Team">
    <meta name="description" content="SmartHall - Sistema de gestión de reservaciones y control de accesos para comunidades">
    <!-- Color de tema para la barra de navegación en móviles -->
    <meta name="theme-color" content="#0ea5a4">
  </head>
  <body>
    <!-- Nodo raíz donde React monta toda la aplicación (ver main.jsx) -->
    <div id="root"></div>
    <!-- Punto de entrada de la aplicación React (módulo ESM) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
